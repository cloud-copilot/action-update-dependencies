name: "Automated Dependency Update"
description: "Automatically updates dependencies, builds, tests, creates a PR, and merges it if changes exist."
author: "Cloud Copilot"

inputs:
  base-branch:
    description: "Base branch for the dependency update pull request."
    required: false
    default: "main"
  merge-method:
    description: "Merge method to use. Supported values: squash, merge, rebase."
    required: false
    default: "squash"
  check-workflow:
    description: "Optional workflow name, ID, or filename to run on the update branch before merging. The workflow must support workflow_dispatch."
    required: false
    default: ""
  post-merge-workflow:
    description: "Optional workflow name, ID, or filename to run on the base branch after merging. The workflow must support workflow_dispatch."
    required: false
    default: ""

outputs:
  pull-request-url:
    description: "URL of the pull request created by this action."
    value: ${{ steps.create_pr.outputs.pull-request-url }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    - name: Update Dependencies
      shell: bash
      run: |
        npm install
        npm update

    - name: Check for changes
      id: check_changes
      shell: bash
      run: |
        if git diff-index --quiet HEAD --; then
          echo "No changes detected."
          echo "changesDetected=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected."
          echo "changesDetected=true" >> $GITHUB_OUTPUT
        fi

    - name: Format project
      if: steps.check_changes.outputs.changesDetected == 'true'
      shell: bash
      run: |
        if npm pkg get scripts.format | grep -qv '^{}$'; then
          npm run format
        else
          echo "No format script found; skipping format."
        fi

    - name: Build project
      if: steps.check_changes.outputs.changesDetected == 'true'
      shell: bash
      run: npm run build

    - name: Test project
      if: steps.check_changes.outputs.changesDetected == 'true'
      shell: bash
      run: npm test

    - name: Create update branch
      if: steps.check_changes.outputs.changesDetected == 'true'
      id: create_branch
      shell: bash
      run: |
        BRANCH="chore/update-dependencies-$(date +'%Y-%b-%d')"
        git checkout -b "$BRANCH"
        echo "BRANCH=$BRANCH" >> $GITHUB_ENV

    - name: Commit changes
      if: steps.check_changes.outputs.changesDetected == 'true'
      shell: bash
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@cloudcopilot.io"
        git add .
        git diff-index --quiet HEAD || git commit -m "chore: automated dependency updates"

    - name: Push branch
      if: steps.check_changes.outputs.changesDetected == 'true'
      shell: bash
      run: git push origin HEAD

    - name: Create Pull Request
      if: steps.check_changes.outputs.changesDetected == 'true'
      id: create_pr
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_TITLE="chore(deps): update dependencies $(date +'%Y-%b-%d')"
        PR_URL="$(gh pr create -B "${{ inputs.base-branch }}" -H "$BRANCH" --title "$PR_TITLE" --body 'Automated dependency updates')"
        echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"
        echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"

    - name: Run check workflow
      if: steps.check_changes.outputs.changesDetected == 'true' && inputs.check-workflow != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        UPDATE_SHA="$(git rev-parse HEAD)"
        gh workflow run "${{ inputs.check-workflow }}" --ref "$BRANCH"

        CHECK_RUN_ID=""

        for _ in {1..30}; do
          CHECK_RUN_ID="$(gh run list --workflow "${{ inputs.check-workflow }}" --branch "$BRANCH" --commit "$UPDATE_SHA" --event workflow_dispatch --json databaseId --jq '.[0].databaseId // empty' --limit 10)"
          if [ -n "$CHECK_RUN_ID" ]; then
            break
          fi

          echo "Check workflow run has not appeared yet; waiting..."
          sleep 10
        done

        if [ -z "$CHECK_RUN_ID" ]; then
          echo "::error::Could not find a workflow_dispatch run for '${{ inputs.check-workflow }}' on branch '$BRANCH' at commit '$UPDATE_SHA'. Ensure the workflow exists on the default branch and includes workflow_dispatch."
          exit 1
        fi

        gh run watch "$CHECK_RUN_ID" --exit-status --interval 30

    - name: Merge Pull Request
      if: steps.check_changes.outputs.changesDetected == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        case "${{ inputs.merge-method }}" in
          squash)
            MERGE_FLAG="--squash"
            ;;
          merge)
            MERGE_FLAG="--merge"
            ;;
          rebase)
            MERGE_FLAG="--rebase"
            ;;
          *)
            echo "::error::Invalid merge-method '${{ inputs.merge-method }}'. Supported values are: squash, merge, rebase."
            exit 1
            ;;
        esac

        gh pr merge "$PR_URL" "$MERGE_FLAG" --delete-branch

    - name: Run post-merge workflow
      if: steps.check_changes.outputs.changesDetected == 'true' && inputs.post-merge-workflow != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        BASE_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${{ inputs.base-branch }}" --jq '.object.sha')"
        gh workflow run "${{ inputs.post-merge-workflow }}" --ref "${{ inputs.base-branch }}"

        POST_MERGE_RUN_ID=""

        for _ in {1..30}; do
          POST_MERGE_RUN_ID="$(gh run list --workflow "${{ inputs.post-merge-workflow }}" --branch "${{ inputs.base-branch }}" --commit "$BASE_SHA" --event workflow_dispatch --json databaseId --jq '.[0].databaseId // empty' --limit 10)"
          if [ -n "$POST_MERGE_RUN_ID" ]; then
            break
          fi

          echo "Post-merge workflow run has not appeared yet; waiting..."
          sleep 10
        done

        if [ -z "$POST_MERGE_RUN_ID" ]; then
          echo "::error::Could not find a workflow_dispatch run for '${{ inputs.post-merge-workflow }}' on branch '${{ inputs.base-branch }}' at commit '$BASE_SHA'. Ensure the workflow exists on the default branch and includes workflow_dispatch."
          exit 1
        fi

        gh run watch "$POST_MERGE_RUN_ID" --exit-status --interval 30
